services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools-runner
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
    command: bun apps/web/scripts/migration/run-stack-migrations.mjs --all
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
    restart: "no"
    profiles:
      - ops

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_FAKE_WITHDRAW: ${NEXT_PUBLIC_FAKE_WITHDRAW:-false}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
        ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
        ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
        CRON_SECRET: ${CRON_SECRET:-change-me}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_FAKE_WITHDRAW: ${NEXT_PUBLIC_FAKE_WITHDRAW:-false}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
      ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
      ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const res = await fetch('http://127.0.0.1:3000/welcome'); if (!res.ok) process.exit(1);",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
        ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
        ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
        CRON_SECRET: ${CRON_SECRET:-change-me}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      GYMRATS_RUNTIME_ROLE: api
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
      ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
      ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const res = await fetch('http://127.0.0.1:4000/healthz'); if (!res.ok) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-runner
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
        ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
        ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
        CRON_SECRET: ${CRON_SECRET:-change-me}
    environment:
      NODE_ENV: production
      GYMRATS_RUNTIME_ROLE: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
      ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
      ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: cron-runner
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
        ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
        ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
        CRON_SECRET: ${CRON_SECRET:-change-me}
    environment:
      NODE_ENV: production
      GYMRATS_RUNTIME_ROLE: cron
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymrats:gymrats@db:5432/gymrats?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
      ABACATEPAY_API_TOKEN: ${ABACATEPAY_API_TOKEN:-}
      ABACATEPAY_WEBHOOK_SECRET: ${ABACATEPAY_WEBHOOK_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    profiles:
      - jobs

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymrats}
      POSTGRES_USER: ${POSTGRES_USER:-gymrats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymrats}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gymrats} -d ${POSTGRES_DB:-gymrats}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
      - local-db

volumes:
  postgres-data:
  redis-data:
