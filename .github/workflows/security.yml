name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - feat-performance

jobs:
  security-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm exec -- prisma generate --schema packages/db/prisma/schema.prisma

      - name: Prisma migration chain safety
        run: npm run migration:safety:prisma -- --track=auto --fail-on-indeterminate=false

      - name: Route auth compliance
        run: npm run audit:routes:auth

      - name: Server console compliance
        run: npm run audit:console:server

      - name: API typecheck
        run: npm run typecheck:api

      - name: Web typecheck
        run: npm run typecheck:web

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit
        run: npm audit --audit-level=high
